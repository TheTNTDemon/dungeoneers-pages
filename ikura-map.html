<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CoI Map | Dungeoneer’s Pages</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');

    :root {
      --bg-dark: #050814;
      --blue-dark: #071426;
      --blue-panel: rgba(7, 20, 38, 0.94);
      --blue-panel-solid: #071426;

      --red-dark: #3a0710;
      --red-main: #7c1020;
      --red-bright: #b32234;

      --gold: #d6a84f;
      --gold-light: #ffd37a;

      --text-main: #f4e6c1;
      --text-muted: #b89f78;

      --shadow: rgba(0, 0, 0, 0.65);
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(124, 16, 32, 0.35), transparent 100%),
        radial-gradient(circle at bottom right, rgba(12, 42, 78, 0.7), transparent 100%),
        var(--bg-dark);
      font-family: "IM Fell English", serif;
      color: var(--text-main);
    }

    #viewport {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    #viewport.dragging {
      cursor: grabbing;
    }

    #world {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    #tileLayer {
      position: absolute;
      left: 0;
      top: 0;
      width: 11023px;
      height: 5787px;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
      transform-origin: 0 0;
      will-change: transform;
    }

    .map-tile {
      position: absolute;
      display: block;
      pointer-events: none;
      user-select: none;
      image-rendering: auto;
      backface-visibility: hidden;
      transform: translateZ(0);
      opacity: 1;
      contain: layout paint size;
    }

    #regionLayer {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 5;
      pointer-events: none;
      isolation: isolate;
      transform-origin: 0 0;
      will-change: transform;
    }

    .map-region {
      pointer-events: auto;
      fill: rgba(14, 36, 72, 0.1);
      stroke: rgba(214, 168, 79, 0.8);
      stroke-width: 3;
      cursor: pointer;
      transition:
        fill 0.15s ease,
        stroke 0.15s ease,
        stroke-width 0.15s ease;
      vector-effect: non-scaling-stroke;
      shape-rendering: geometricPrecision;
      paint-order: stroke fill;
    }

    #viewport.moving .map-region {
      transition: none;
    }

    .map-region:hover {
      fill: rgba(14, 36, 72, 0.28);
      stroke: var(--gold-light);
      stroke-width: 4;
    }

    .map-region.active {
      fill: rgba(124, 16, 32, 0.28);
      stroke: var(--gold-light);
      stroke-width: 5;
    }

    #controls {
      position: fixed;
      left: 5px;
      top: 5px;
      z-index: 25;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      max-width: 480px;
      padding: 10px;
      background:
        linear-gradient(180deg, rgba(7, 20, 38, 0.92), rgba(58, 7, 16, 0.88));
      border: 2px solid rgba(214, 168, 79, 0.75);
      box-shadow:
        0 0 0 2px rgba(0, 0, 0, 0.45),
        0 12px 30px var(--shadow),
        inset 0 0 24px rgba(214, 168, 79, 0.08);
    }

    #controls::before,
    #controls::after {
      content: "✦";
      color: var(--gold);
      align-self: center;
      font-size: 14px;
      text-shadow: 0 0 8px rgba(255, 211, 122, 0.8);
    }

    #controls button {
      border: 2px solid var(--gold);
      padding: 8px 13px;
      min-width: 38px;
      min-height: 34px;

      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;

      background:
        linear-gradient(180deg, var(--red-main), var(--red-dark));
      color: var(--text-main);
      font-family: "IM Fell English", serif;
      font-size: 14px;
      line-height: 1;
      letter-spacing: 1px;
      cursor: pointer;
      box-sizing: border-box;
      appearance: none;
      -webkit-appearance: none;
      text-align: center;
      box-shadow:
        inset 0 0 8px rgba(255, 211, 122, 0.12),
        0 4px 0 rgba(0, 0, 0, 0.45);
    }

    #controls button .buttonText,
    #closePanel .buttonText {
      position: absolute;
      left: 50%;
      top: 50%;
      display: block;
      width: 1em;
      height: 1em;
      line-height: 1em;
      text-align: center;
      pointer-events: none;
      letter-spacing: 0;
      font-family: "IM Fell English", serif;
      font-weight: normal;
      transform: translate(-50%, -50%) translate(var(--button-text-x, 0), var(--button-text-y, 0));
    }

    #controls .zoomButton {
      width: 38px;
      height: 34px;
      min-width: 38px;
      min-height: 34px;
      padding: 0;
      font-size: 21px;
      letter-spacing: 0;
    }

    #zoomInButton .buttonText {
      --button-text-y: 0px;
    }

    #zoomOutButton .buttonText {
      --button-text-y: 0px;
    }

    #controls button:hover {
      background:
        linear-gradient(180deg, var(--red-bright), var(--red-main));
      color: var(--gold-light);
      text-shadow: 0 0 8px rgba(255, 211, 122, 0.9);
    }

    #controls button:active {
      transform: translateY(2px);
      box-shadow:
        inset 0 0 12px rgba(0, 0, 0, 0.45),
        0 2px 0 rgba(0, 0, 0, 0.45);
    }

    #infoPanel {
      position: fixed;
      top: 0;
      right: 0;
      width: 390px;
      max-width: 88vw;
      height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(124, 16, 32, 0.38), transparent 38%),
        linear-gradient(180deg, rgba(7, 20, 38, 0.98), rgba(4, 8, 18, 0.98));
      color: var(--text-main);
      padding: 28px;
      box-sizing: border-box;
      z-index: 30;
      border-left: 3px solid var(--gold);
      box-shadow:
        -12px 0 32px rgba(0, 0, 0, 0.65),
        inset 0 0 28px rgba(124, 16, 32, 0.25);
      transition: transform 0.25s ease;
      overflow-y: auto;
    }

    #infoPanel.hidden {
      transform: translateX(100%);
    }

    #infoPanel::before {
      content: "REGION SCROLL";
      display: block;
      margin-bottom: 16px;
      padding-bottom: 10px;
      color: var(--gold-light);
      font-size: 16px;
      letter-spacing: 2px;
      border-bottom: 2px solid rgba(214, 168, 79, 0.5);
      text-shadow: 0 0 8px rgba(255, 211, 122, 0.5);
    }

    #closePanel {
      position: absolute;
      top: 14px;
      right: 18px;
      border: 2px solid var(--gold);
      background:
        linear-gradient(180deg, var(--red-main), var(--red-dark));
      color: var(--text-main);
      font-family: "IM Fell English", serif;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      width: 38px;
      height: 38px;
      padding: 0;

      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;

      box-sizing: border-box;
      appearance: none;
      -webkit-appearance: none;
      text-align: center;
      letter-spacing: 0;
      --button-text-y: 0px;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.45);
    }

    #closePanel:hover {
      color: var(--gold-light);
      background:
        linear-gradient(180deg, var(--red-bright), var(--red-main));
    }

    #panelTitle {
      margin: 34px 0 8px;
      color: var(--gold-light);
      font-size: 32px;
      font-weight: normal;
      letter-spacing: 2px;
      text-shadow:
        0 3px 0 rgba(0, 0, 0, 0.9),
        0 0 12px rgba(255, 211, 122, 0.35);
    }

    #panelSubtitle {
      margin: 0 0 22px;
      color: var(--text-muted);
      font-size: 16px;
      letter-spacing: 1px;
    }

    #panelText {
      line-height: 1.35;
      font-size: 17px;
      letter-spacing: 1px;
      color: var(--text-main);
    }

    #panelMeta {
      margin-top: 26px;
      padding-top: 18px;
      border-top: 2px solid rgba(214, 168, 79, 0.35);
      color: var(--text-muted);
      font-size: 14px;
      letter-spacing: 1px;
    }

    #panelMeta div {
      margin-bottom: 10px;
    }

    #panelMeta strong {
      color: var(--gold-light);
      font-weight: normal;
    }

    .tag {
      display: inline-block;
      margin: 4px 4px 4px 0;
      padding: 5px 10px;
      background:
        linear-gradient(180deg, rgba(124, 16, 32, 0.9), rgba(58, 7, 16, 0.9));
      color: var(--gold-light);
      border: 1px solid rgba(214, 168, 79, 0.75);
      font-size: 12px;
      letter-spacing: 1px;
      box-shadow: inset 0 0 8px rgba(255, 211, 122, 0.08);
    }

    ::selection {
      background: var(--red-main);
      color: var(--gold-light);
    }

    @media (max-width: 700px) {
      #controls {
        left: 10px;
        top: 10px;
        max-width: calc(100vw - 20px);
      }

      #controls button {
        font-size: 12px;
        padding: 7px 10px;
        min-width: 34px;
        min-height: 32px;
      }

      #controls .zoomButton {
        width: 34px;
        height: 32px;
        min-width: 34px;
        min-height: 32px;
        padding: 0;
        font-size: 22px;
      }

      #infoPanel {
        width: 100vw;
        max-width: 100vw;
      }
    }
  </style>
</head>

<body>
  <div id="viewport">
    <div id="world">
      <div id="tileLayer" aria-label="Fantasy Map"></div>

      <svg

    </div>
  </div>

    <div id="panelMeta"></div>

      if (!event.target.closest(".map-region")) {
        closeInfoPanel();
      }
    });

    viewport.addEventListener("dblclick", event => {
      if (event.target.closest(".map-region")) return;

      fitImageToScreen();
    });

    closePanel.addEventListener("click", event => {
      event.stopPropagation();
      closeInfoPanel();
    });

    infoPanel.addEventListener("click", event => {
      event.stopPropagation();
    });

    fitButton.addEventListener("click", event => {
      event.stopPropagation();
      fitImageToScreen();
    });

    actualSizeButton.addEventListener("click", event => {
      event.stopPropagation();
      actualImageSize();
    });

    zoomOutButton.addEventListener("click", event => {
      event.stopPropagation();
      zoomByFactor(0.8);
    });

    zoomInButton.addEventListener("click", event => {
      event.stopPropagation();
      zoomByFactor(1.25);
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeInfoPanel();
      }

      if (event.key === "0") {
        fitImageToScreen();
      }

      if (event.key === "1") {
        actualImageSize();
      }
    });

    createRegions();
    fitImageToScreen();

    window.addEventListener("resize", () => {
      updateZoomLimits();

      if (scale < minScale) {
        scale = minScale;
      }

      updateTransform();
    });
  </script>
</body>
</html>
